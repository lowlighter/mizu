<mizu-directive id="once" directory="once">
  <code #name><span class="hljs-keyword">*once</span></code>
  <p #description>
    Render an element once and skip subsequent updates.
  </p>
  <code #example *skip>
    <div *once>
      <!--...-->
    </div>
  </code>
  <mizu-modifier #modifier name="flat">
    Replace occurrences of this custom element with its content.
  </mizu-modifier>
</mizu-directive>
